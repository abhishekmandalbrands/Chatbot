    async function callAI(conversationMessages) {
      // Find first user message (Gemini also requires conversation to start with user)
      const firstUserIdx = conversationMessages.findIndex(m => m.role === "user");
      if (firstUserIdx === -1) throw new Error("No user message found");

      // Map our messages to Gemini format: role 'assistant' -> 'model', text -> parts
      const contents = conversationMessages.slice(firstUserIdx).map(m => ({
        role: m.role === "assistant" ? "model" : "user",
        parts: [{ text: m.text }],
      }));

      if (!GEMINI_API_KEY || GEMINI_API_KEY === "PASTE_YOUR_GEMINI_API_KEY_HERE") {
        throw new Error("Add your free Gemini API key in the HTML file. Get one at aistudio.google.com/apikey");
      }

      const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + encodeURIComponent(GEMINI_API_KEY);

      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: contents,
          generationConfig: {
            maxOutputTokens: 1000,
            temperature: 0.7,
            responseMimeType: "application/json",
          },
        }),
      });

      if (!response.ok) {
        const errBody = await response.text();
        throw new Error("API " + response.status + ": " + errBody.slice(0, 300));
      }

      const data = await response.json();
      const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const cleaned = raw.replace(/^```json\s*/i, "").replace(/\s*```$/, "").trim();

      try {
        const parsed = JSON.parse(cleaned);
        return {
          message: typeof parsed.message === "string" ? parsed.message : raw,
          productIds: Array.isArray(parsed.productIds) ? parsed.productIds : [],
        };
      } catch {
        return { message: cleaned || "Something went wrong, please try again.", productIds: [] };
      }
    }

    /* ── Message text with link parsing ────────────────────────────────── */
    function MessageText({ text }) {
      const parts = [];
      const regex = /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g;
      let last = 0, match;
      while ((match = regex.exec(text)) !== null) {
        if (match.index > last) parts.push({ type:"text", content:text.slice(last, match.index) });
        parts.push({ type:"link", label:match[1], url:match[2] });
        last = match.index + match[0].length;
      }
      if (last < text.length) parts.push({ type:"text", content:text.slice(last) });
      return (
        <span>
          {parts.map((p, i) =>
            p.type === "link"
              ? <a key={i} href={p.url} target="_blank" rel="noopener noreferrer"
                  style={{ color:"#c8102e", fontWeight:600, textDecoration:"underline" }}>{p.label}</a>
              : <span key={i} style={{ whiteSpace:"pre-wrap" }}>{p.content}</span>
          )}
        </span>
      );
    }

      { id:"collectibles",    label:"Collectibles",     icon:"🏍️", url:"https://store.royalenfield.com/en/collections/collectibles",    color:"#c8102e" },
    ];

    const EXCITING_LINKS = [
      { label:"🔥 Best Sellers",       url:"https://store.royalenfield.com/en/collections/best-sellers",     bg:"#fff4e6", color:"#c2410c", border:"#fed7aa" },
      { label:"✨ Just Launched",      url:"https://store.royalenfield.com/en/collections/new-arrivals",     bg:"#ecfdf5", color:"#047857", border:"#a7f3d0" },
      { label:"⏳ Almost Stock Out",   url:"https://store.royalenfield.com/en/collections/limited-stock",    bg:"#fef2f2", color:"#b91c1c", border:"#fecaca" },
      { label:"🛡️ High Safety Gear",   url:"https://store.royalenfield.com/en/collections/safety-gear",      bg:"#eff6ff", color:"#1d4ed8", border:"#bfdbfe" },
      { label:"💸 Deals Under ₹999",   url:"https://store.royalenfield.com/en/collections/under-999",        bg:"#fef9c3", color:"#a16207", border:"#fde68a" },
      { label:"🎁 Gifting Picks",      url:"https://store.royalenfield.com/en/collections/gifts",            bg:"#fdf2f8", color:"#be185d", border:"#fbcfe8" },
    ];

    /* ── Main App ───────────────────────────────────────────────────────── */
    const QUICK_REPLIES = [
      "Show me hoodies", "Best gifting options",
      "What is on sale?", "Track my order",
      "Size guide", "EMI options?",
    ];

    function App() {
      const [messages, setMessages] = useState([{
        role:"assistant",
        text:"Hey there! Welcome to the Royal Enfield Store.\n\nI can help you find apparel, merchandise and collectibles. What are you looking for today?",
        productIds:[],
      }]);
      const [input, setInput]       = useState("");
      const [loading, setLoading]   = useState(false);
      const [errorMsg, setErrorMsg] = useState("");
      const [showQuick, setShowQuick] = useState(true);
      const bottomRef = useRef(null);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior:"smooth" });
      }, [messages, loading]);

      const resetChat = () => {
        setMessages([{
          role:"assistant",
          text:"Hey there! Welcome to the Royal Enfield Store.\n\nI can help you find apparel, merchandise and collectibles. What are you looking for today?",
          productIds:[],
        }]);
        setInput("");
        setLoading(false);
        setErrorMsg("");
        setShowQuick(true);
      };

      const send = async (textArg) => {
        const msg = (textArg !== undefined ? textArg : input).trim();
        if (!msg || loading) return;
        setInput(""); setShowQuick(false); setErrorMsg("");
        const userMsg = { role:"user", text:msg, productIds:[] };
        const updated = [...messages, userMsg];
        setMessages(updated);
        setLoading(true);
        try {
          const result = await callAI(updated);
          setMessages(prev => [...prev, {
            role:"assistant", text:result.message, productIds:result.productIds,
          }]);
        } catch (e) {
          setErrorMsg(String(e && e.message ? e.message : e));
          setMessages(prev => [...prev, {
            role:"assistant", text:"Sorry, I ran into an error. Please try again.", productIds:[],
          }]);
        }
        setLoading(false);
      };

      return (
        <div style={{ width:"100%", maxWidth:420, height:"min(780px, 92vh)",
          display:"flex", flexDirection:"column", background:"#fff",
          borderRadius:24, boxShadow:"0 24px 80px rgba(0,0,0,0.14)",
          overflow:"hidden", animation:"fadeUp 0.4s ease" }}>

          {/* Header */}
          <div style={{ padding:"16px 20px", borderBottom:"1px solid #f0eeeb",
            display:"flex", alignItems:"center", gap:12, flexShrink:0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, flex:1, minWidth:0 }}>
              <img src={LOGO_URL} alt="Royal Enfield Apparel"
                style={{ height:36, width:"auto", flexShrink:0, borderRadius:6 }} />
              <div style={{ display:"flex", alignItems:"center", gap:5, minWidth:0 }}>
                <div style={{ width:6, height:6, borderRadius:"50%", background:"#22c55e", flexShrink:0 }} />
                <span style={{ fontSize:11, color:"#888", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>AI Shopping Assistant</span>
              </div>
            </div>
            <button onClick={resetChat}
              style={{ fontSize:11, color:"#555", fontWeight:700,
                background:"#f5f4f1", padding:"6px 11px", borderRadius:8,
                border:"1px solid #e0dedd", whiteSpace:"nowrap", display:"flex",
                alignItems:"center", gap:4, cursor:"pointer", fontFamily:"inherit", flexShrink:0 }}
              onMouseEnter={e => { e.target.style.background="#e8e6e2"; }}
              onMouseLeave={e => { e.target.style.background="#f5f4f1"; }}>
              🏠 Home
            </button>
          </div>

          {/* Error banner */}
          {errorMsg && (
            <div style={{ background:"#fff0f0", borderBottom:"1px solid #ffd6d6",
              padding:"7px 16px", fontSize:11, color:"#c00", flexShrink:0, wordBreak:"break-all" }}>
              ⚠ {errorMsg}
            </div>
          )}

          {/* Messages */}
          <div style={{ flex:1, overflowY:"auto", padding:"14px 14px 8px",
            display:"flex", flexDirection:"column", gap:10, background:"#faf9f7" }}>

            {messages.map((m, i) => (
              <div key={i} style={{
                display:"flex", flexDirection:"column",
                alignItems: m.role === "user" ? "flex-end" : "flex-start",
                animation:"fadeUp 0.2s ease",
              }}>
                <div style={{
                  maxWidth:"82%", padding:"10px 14px",
                  borderRadius: m.role === "user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
                  background: m.role === "user" ? "#1a1a1a" : "#fff",
                  border: m.role === "assistant" ? "1px solid #ebebeb" : "none",
                  color: m.role === "user" ? "#fff" : "#2a2a2a",
                  fontSize:13.5, lineHeight:1.6,
                }}>
                  <MessageText text={m.text} />
                </div>
                {m.role === "assistant" && m.productIds && m.productIds.length > 0 && (
                  <div style={{ maxWidth:"92%", marginTop:8, width:"100%" }}>
                    {m.productIds.map(id => {
                      const p = PRODUCTS.find(x => x.id === id);
                      return p ? <ProductCard key={id} product={p} /> : null;
                    })}
                  </div>
                )}
              </div>
            ))}

            {loading && (
              <div style={{ display:"flex", gap:5, padding:"11px 14px", background:"#fff",
                borderRadius:"18px 18px 18px 4px", width:"fit-content", border:"1px solid #ebebeb" }}>
                {[0,1,2].map(i => (
                  <div key={i} style={{ width:7, height:7, borderRadius:"50%", background:"#c8102e",
                    animation:`bounce 1s ${i*0.18}s infinite` }} />
                ))}
              </div>
            )}

            {showQuick && messages.length === 1 && (
              <div style={{ marginTop:6, display:"flex", flexDirection:"column", gap:14 }}>

                {/* CATEGORIES */}
                <div>
                  <div style={{ fontSize:10, color:"#bbb", marginBottom:8,
                    fontWeight:700, letterSpacing:"0.08em" }}>SHOP BY CATEGORY</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:7 }}>
                    {CATEGORIES.map(cat => (
                      <a key={cat.id} href={cat.url} target="_blank" rel="noopener noreferrer"
                        style={{ background:"#fff", border:"1px solid #ebe9e6",
                          borderRadius:12, padding:"11px 12px", textDecoration:"none",
                          display:"flex", alignItems:"center", gap:9,
                          transition:"all 0.18s", cursor:"pointer" }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor=cat.color; e.currentTarget.style.transform="translateY(-1px)"; e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.06)"; }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor="#ebe9e6"; e.currentTarget.style.transform="translateY(0)"; e.currentTarget.style.boxShadow="none"; }}>
                        <div style={{ fontSize:18, flexShrink:0 }}>{cat.icon}</div>
                        <div style={{ fontSize:12, fontWeight:700, color:"#1a1a1a", lineHeight:1.2 }}>{cat.label}</div>
                      </a>
                    ))}
                  </div>
                </div>

                {/* EXCITING LINKS */}
                <div>
                  <div style={{ fontSize:10, color:"#bbb", marginBottom:8,
                    fontWeight:700, letterSpacing:"0.08em" }}>TRENDING NOW</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                    {EXCITING_LINKS.map((l, i) => (
                      <a key={i} href={l.url} target="_blank" rel="noopener noreferrer"
                        style={{ background:l.bg, border:"1px solid "+l.border,
                          borderRadius:20, padding:"6px 12px", fontSize:11.5,
                          color:l.color, fontWeight:700, textDecoration:"none",
                          fontFamily:"inherit", transition:"transform 0.15s",
                          display:"inline-block" }}
                        onMouseEnter={e => { e.target.style.transform="translateY(-1px)"; }}
                        onMouseLeave={e => { e.target.style.transform="translateY(0)"; }}>
                        {l.label}
                      </a>
                    ))}
                  </div>
                </div>

                {/* QUICK QUESTIONS */}
                <div>
                  <div style={{ fontSize:10, color:"#bbb", marginBottom:8,
                    fontWeight:700, letterSpacing:"0.08em" }}>OR ASK ME</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                    {QUICK_REPLIES.map((q, i) => (
                      <button key={i} onClick={() => send(q)} style={{
                        background:"#fff", border:"1px solid #e5e3e0",
                        borderRadius:20, padding:"6px 12px", fontSize:12,
                        color:"#555", cursor:"pointer", fontFamily:"inherit", transition:"all 0.15s",
                      }}
                        onMouseEnter={e => { e.target.style.background="#fff0f2"; e.target.style.borderColor="#c8102e"; e.target.style.color="#c8102e"; }}
                        onMouseLeave={e => { e.target.style.background="#fff"; e.target.style.borderColor="#e5e3e0"; e.target.style.color="#555"; }}
                      >{q}</button>
                    ))}
                  </div>
                </div>

              </div>
            )}

            <div ref={bottomRef} />
          </div>

          {/* Input */}
          <div style={{ padding:"12px 14px 16px", borderTop:"1px solid #f0eeeb", flexShrink:0 }}>
            <div style={{ display:"flex", gap:8, alignItems:"center",
              background:"#f5f4f1", borderRadius:14, padding:"4px 4px 4px 14px" }}>
              <input
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
                placeholder="Ask about products, size, delivery..."
                disabled={loading}
                style={{ flex:1, background:"none", border:"none", outline:"none",
                  fontSize:13.5, color:"#1a1a1a", fontFamily:"inherit", padding:"7px 0" }}
              />
              <button onClick={() => send()} disabled={loading || !input.trim()} style={{
                width:38, height:38, borderRadius:10, border:"none",
                background: input.trim() && !loading ? "#c8102e" : "#e0dedd",
                color:"#fff", fontSize:15, cursor: input.trim() && !loading ? "pointer" : "default",
                display:"flex", alignItems:"center", justifyContent:"center",
                transition:"background 0.2s", flexShrink:0,
              }}>&#10148;</button>
            </div>
            <div style={{ textAlign:"center", marginTop:8, fontSize:10, color:"#ccc", letterSpacing:"0.06em" }}>
              POWERED BY AI · store.royalenfield.com/en
            </div>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
